<div class="app-container">
  <header class="app-header">
    <h1>🔄 Metric Recalculation Tool</h1>
    <p class="subtitle">Batch process metric snapshot recalculations</p>
  </header>

  <main class="app-content">
    <div class="left-panel">
      <app-config-form 
        (configSubmit)="onConfigSubmit($event)"
      ></app-config-form>

      <app-file-upload 
        (filesSelected)="onFilesSelected($event)"
      ></app-file-upload>

      <app-controls
        [status]="status"
        [isConfigured]="isConfigured"
        [hasData]="hasData"
        [concurrency]="concurrency"
        (start)="onStart()"
        (pause)="onPause()"
        (resume)="onResume()"
        (stop)="onStop()"
        (reset)="onReset()"
        (concurrencyChange)="onConcurrencyChange($event)"
      ></app-controls>
    </div>

    <div class="right-panel">
      <app-progress-dashboard></app-progress-dashboard>
    </div>
  </main>

  <footer class="app-footer">
    <p>Metric Recalculation Tool v1.0 | {{ metricData.length }} items loaded</p>
  </footer>
</div>
