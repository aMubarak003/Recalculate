<div class="config-form-container">
  <h3>⚙️ Configuration</h3>
  
  <form [formGroup]="configForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="domainUrl">Domain URL *</label>
      <input 
        type="url" 
        id="domainUrl" 
        formControlName="domainUrl"
        placeholder="https://api.example.com"
        [class.invalid]="domainUrl?.invalid && domainUrl?.touched"
      />
      <span class="error" *ngIf="domainUrl?.invalid && domainUrl?.touched">
        Please enter a valid URL (starting with http:// or https://)
      </span>
    </div>

    <button type="submit" [disabled]="configForm.invalid" class="btn-primary">
      Save Configuration
    </button>
  </form>
</div>
